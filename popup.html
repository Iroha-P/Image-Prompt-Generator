<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片提示词生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-page-title-key="pageTitlePopup">
  <div class="container">
    <header class="header">
      <h1 data-i18n="popupTitle">图片提示词生成器</h1>
      <div class="header-actions">
        <p class="subtitle" data-i18n="popupSubtitle">右键点击网页图片 → 识别并生成提示词</p>
        <div class="header-controls">
          <select id="language-select" class="lang-select lang-select-compact" data-i18n-aria-label="languageLabel">
            <option value="en" data-i18n="langEnglish">English</option>
            <option value="zh" data-i18n="langChinese">中文</option>
            <option value="ja" data-i18n="langJapanese">日本語</option>
          </select>
          <button id="btn-fullscreen" class="btn btn-icon" data-i18n-title="fullscreenTitle">🖥️</button>
          <button id="btn-settings" class="btn btn-icon" data-i18n-title="settings">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Settings Panel -->
    <section id="settings-panel" class="settings-panel hidden">
      <div class="setting-group">
        <label for="provider-select" data-i18n="providerLabel">API 服务商</label>
        <select id="provider-select">
          <option value="siliconflow">硅基流动 SiliconFlow (国内推荐)</option>
          <option value="google">Google Gemini</option>
          <option value="anthropic">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
          <option value="opencode">OpenCode Zen</option>
          <option value="vtrix">Vtrix</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="api-key-input" id="api-key-label" data-i18n="apiKeyLabel">Google API Key</label>
        <div class="input-row">
          <input id="api-key-input" type="password" placeholder="AIzaSy..." autocomplete="off">
          <button id="btn-toggle-key" class="btn btn-icon" data-i18n-title="toggleKeyVisibility">👁️</button>
        </div>
        <a id="api-key-link" class="help-link" href="https://aistudio.google.com/apikey" target="_blank">获取 Google API Key →</a>
      </div>
      <div class="setting-group">
        <label for="model-select" data-i18n="modelLabel">模型</label>
        <select id="model-select">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>
      </div>
      <button id="btn-save-settings" class="btn btn-primary btn-sm" data-i18n="saveSettings">保存设置</button>
    </section>

    <!-- Empty State -->
    <section id="empty-state" class="empty-state">
      <div class="empty-icon">🖼️</div>
      <p data-i18n="emptyTitle">暂无选中的图片</p>
      <p class="hint" data-i18n="emptyHint">在网页中右键点击任意图片，选择「识别图片并生成提示词」</p>
    </section>

    <!-- Result Section -->
    <section id="result-section" class="result-section hidden">
      <div class="image-preview">
        <img id="preview-img" src="" alt="预览图片">
      </div>

      <div class="action-bar">
        <button id="btn-generate" class="btn btn-primary">
          <span class="btn-text" data-i18n="generatePrompt">生成提示词</span>
          <span class="btn-loading hidden" data-i18n="generating">识别中...</span>
        </button>
      </div>

      <div id="prompt-output" class="prompt-output hidden">
        <div class="prompt-header">
          <span class="prompt-label" data-i18n="generatedPrompt">生成的提示词</span>
          <button id="btn-copy" class="btn btn-ghost" data-i18n-title="copy">📋 <span data-i18n="copy">复制</span></button>
        </div>
        <div id="prompt-text" class="prompt-text"></div>
      </div>
    </section>

    <footer class="footer">
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
