<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Prompt Generator - 图片提示词生成器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="navbar">
      <div class="navbar-brand">
        <span class="logo">IP</span>
        <span class="brand-text">Image Prompt Generator</span>
      </div>
      <button id="btn-settings" class="navbar-btn" title="API 设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>设置</span>
      </button>
    </header>

    <main class="main">
      <!-- Settings Modal -->
      <div id="settings-overlay" class="modal-overlay hidden">
        <div class="modal" id="settings-modal">
          <div class="modal-header">
            <h2>API 设置</h2>
            <button id="btn-close-settings" class="modal-close">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label for="provider-select">API 服务商</label>
              <select id="provider-select">
                <option value="siliconflow">硅基流动 SiliconFlow (国内推荐)</option>
                <option value="google">Google Gemini</option>
                <option value="anthropic">Claude (Anthropic)</option>
                <option value="openai">OpenAI</option>
                <option value="opencode">OpenCode Zen</option>
                <option value="vtrix">Vtrix</option>
              </select>
            </div>
            <div class="form-group">
              <label for="api-key-input" id="api-key-label">API Key</label>
              <div class="input-with-action">
                <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off">
                <button id="btn-toggle-key" class="input-action-btn" title="显示/隐藏">
                  <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <a id="api-key-link" class="form-help-link" href="#" target="_blank">获取 API Key &rarr;</a>
            </div>
            <div class="form-group">
              <label for="model-select">模型</label>
              <select id="model-select"></select>
            </div>
          </div>
          <div class="modal-footer">
            <button id="btn-save-settings" class="btn btn-primary">保存设置</button>
          </div>
        </div>
      </div>

      <!-- Upload Zone -->
      <section id="upload-zone" class="upload-zone">
        <div id="drop-area" class="drop-area">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <p class="drop-title">拖拽图片到这里，或点击上传</p>
          <p class="drop-hint">支持 JPG、PNG、GIF、WebP 格式</p>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>
        <div class="url-input-section">
          <div class="divider"><span>或者</span></div>
          <div class="url-input-row">
            <input type="text" id="url-input" placeholder="粘贴图片 URL 地址..." autocomplete="off">
            <button id="btn-load-url" class="btn btn-secondary">加载</button>
          </div>
        </div>
      </section>

      <!-- Result Section -->
      <section id="result-section" class="result-section hidden">
        <div class="result-grid">
          <!-- Image Preview -->
          <div class="preview-card">
            <div class="card-header">
              <span>图片预览</span>
              <button id="btn-change-image" class="btn btn-ghost btn-sm">更换图片</button>
            </div>
            <div class="preview-body">
              <img id="preview-img" src="" alt="预览图片">
            </div>
            <div class="card-actions">
              <button id="btn-generate" class="btn btn-primary btn-lg btn-block">
                <svg class="btn-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span class="btn-text">生成提示词</span>
                <span class="btn-loading hidden">
                  <span class="spinner"></span>
                  识别中...
                </span>
              </button>
            </div>
          </div>

          <!-- Prompt Output -->
          <div id="prompt-card" class="prompt-card hidden">
            <div class="card-header">
              <span>生成的提示词</span>
              <button id="btn-copy" class="btn btn-ghost btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                复制
              </button>
            </div>
            <div id="prompt-text" class="prompt-text"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
